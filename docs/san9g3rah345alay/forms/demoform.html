  <!-- Name -->
  <label for="name">Full Name:</label>
  <input type="text" id="name" name="name" placeholder="Enter your full name" required>

  <!-- Email -->
  <label for="email">Email (Optional):</label>
  <input type="email" id="email" name="email" placeholder="Enter your email">

  <!-- Phone -->
  <label for="phone">Phone Number (You'll get a callback before the demo):</label>
  <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>

  <!-- Company -->
  <label for="school">School Name:</label>
  <input type="text" id="school" name="school" placeholder="Enter school name of the child">

  <!-- Preferred Demo Date & Time -->
  <label for="availability">Availability:</label>
  <input type="text" id="availability" name="availability" placeholder="Tell us about your available timings for the demo" required>

  <!-- How did you hear about us -->
  <label for="source">How did you hear about us?</label>
  <select id="source" name="source">
    <option value="">Select an option</option>
    <option value="friend">Friend/Colleague</option>
    <option value="social">Social Media</option>
    <option value="ad">Advertisement</option>
    <option value="other">Other</option>
  </select>

  <!-- Additional Notes -->
  <label for="notes">Additional Notes / Questions (optional):</label>
  <textarea id="notes" name="notes" placeholder="Write any specific requests or questions" rows="4"></textarea>
