<!-- Name -->
  <label for="name">Name:</label>
  <input type="text" id="name" name="name" placeholder="Enter your name" required>

  <!-- About You -->
  <label for="about-you">About You (Will be seen publicly):</label>
  <textarea id="about-you" name="about-you" placeholder="Tell site viewers about yourself" rows="4" required></textarea>

  <!-- Feedback -->
  <label for="feedback">Your Feedback:</label>
  <textarea id="feedback" name="feedback" placeholder="Write your feedback here" rows="6" required></textarea>

  <!-- Picture -->
  <label for="picture">Picture (optional):</label>
  <input type="file" id="picture" name="picture" accept="image/*">

  <!-- Rating (optional improvement) -->
  <label for="rating">Rating (optional):</label>
  <select id="rating" name="rating">
    <option value="">Select a rating</option>
    <option value="1">1 - Poor</option>
    <option value="2">2 - Fair</option>
    <option value="3">3 - Good</option>
    <option value="4">4 - Very Good</option>
    <option value="5">5 - Excellent</option>
  </select>
